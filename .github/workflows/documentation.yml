name: Documentation

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  build:
    name: Build Pages artifact
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: read
      pages: read
    outputs:
      artifact_id: ${{ steps.pages-artifact.outputs.artifact_id }}
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
      DOCS_OUTPUT: ${{ github.workspace }}/../swiftql-docs

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Verify exact source commit
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Validate and report compiler environment
        env:
          EXPECTED_XCODE_VERSION: "16.2"
          EXPECTED_XCODE_BUILD: 16C5032a
          EXPECTED_SWIFT_SERIES: "6.0"
          EXPECTED_SDK_VERSION: "15.2"
          EXPECTED_DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
        run: scripts/ci/check-compatibility-environment.sh

      - name: Configure Pages metadata
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Build and inspect DocC site
        env:
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          set -euo pipefail
          hosting_base_path="${PAGES_BASE_PATH#/}"
          if [[ -z "$hosting_base_path" ]]; then
            echo "error: expected a project Pages base path" >&2
            exit 1
          fi
          SWIFTQL_DOCC_HOSTING_BASE_PATH="$hosting_base_path" \
            ./make-docs.sh "$DOCS_OUTPUT"

      - name: Record artifact provenance
        run: |
          set -euo pipefail
          printf '{\n  "commit_sha": "%s",\n  "source_ref": "%s",\n  "source_ref_name": "%s",\n  "run_id": "%s",\n  "run_attempt": "%s",\n  "repository": "%s",\n  "workflow_url": "https://github.com/%s/actions/runs/%s"\n}\n' \
            "$GITHUB_SHA" \
            "$GITHUB_REF" \
            "$GITHUB_REF_NAME" \
            "$GITHUB_RUN_ID" \
            "$GITHUB_RUN_ATTEMPT" \
            "$GITHUB_REPOSITORY" \
            "$GITHUB_REPOSITORY" \
            "$GITHUB_RUN_ID" \
            > "$DOCS_OUTPUT/swiftql-pages-provenance.json"

      - name: Verify checkout remains clean
        run: |
          git diff --exit-code
          test -z "$(git status --porcelain)"

      - name: Upload Pages artifact
        id: pages-artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ${{ env.DOCS_OUTPUT }}
          include-hidden-files: true

      - name: Record build summary
        env:
          ARTIFACT_ID: ${{ steps.pages-artifact.outputs.artifact_id }}
        run: |
          {
            printf '### SwiftQL documentation artifact\n\n'
            printf -- '- Commit: `%s`\n' "$GITHUB_SHA"
            printf -- '- Artifact ID: `%s`\n' "$ARTIFACT_ID"
            printf -- '- Run: https://github.com/%s/actions/runs/%s\n' \
              "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy GitHub Pages
    if: >-
      ${{
        (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
        github.ref == 'refs/heads/main'
      }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

      - name: Verify deployed commit and catalog pages
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          site_url="${PAGE_URL%/}/"
          provenance="$RUNNER_TEMP/swiftql-pages-provenance.json"
          deployed=false
          for attempt in {1..30}; do
            if curl --fail --silent --show-error \
              --header 'Cache-Control: no-cache' \
              "${site_url}swiftql-pages-provenance.json?run=${GITHUB_RUN_ID}" \
              --output "$provenance" \
              && jq --exit-status \
                --arg commit_sha "$GITHUB_SHA" \
                --arg run_id "$GITHUB_RUN_ID" \
                '.commit_sha == $commit_sha and
                 .run_id == $run_id and
                 (.run_attempt | type == "string" and length > 0)' \
                "$provenance" > /dev/null; then
              deployed=true
              break
            fi
            if [[ "$attempt" -lt 30 ]]; then
              sleep 10
            fi
          done
          if [[ "$deployed" != true ]]; then
            echo "error: deployed provenance did not match this commit and run" >&2
            exit 1
          fi
          curl --fail --silent --show-error \
            --retry 12 --retry-all-errors --retry-delay 5 \
            "${site_url}documentation/swiftql/" \
            --output /dev/null
          curl --fail --silent --show-error \
            --retry 12 --retry-all-errors --retry-delay 5 \
            "${site_url}documentation/swiftql/gettingstarted/" \
            --output /dev/null
          curl --fail --silent --show-error \
            --retry 12 --retry-all-errors --retry-delay 5 \
            "${site_url}data/documentation/swiftql.json" \
            | jq --exit-status '.metadata.title == "SwiftQL"' > /dev/null
          curl --fail --silent --show-error \
            --retry 12 --retry-all-errors --retry-delay 5 \
            "${site_url}data/documentation/swiftql/gettingstarted.json" \
            | jq --exit-status \
              '(.metadata.title | ascii_downcase) == "getting started"' \
              > /dev/null

      - name: Record deployment summary
        env:
          ARTIFACT_ID: ${{ needs.build.outputs.artifact_id }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          {
            printf '### SwiftQL documentation deployment\n\n'
            printf -- '- Commit: `%s`\n' "$GITHUB_SHA"
            printf -- '- Artifact ID: `%s`\n' "$ARTIFACT_ID"
            printf -- '- Run: https://github.com/%s/actions/runs/%s\n' \
              "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID"
            printf -- '- Site: %s\n' "$PAGE_URL"
          } >> "$GITHUB_STEP_SUMMARY"
