name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  build:
    name: Build Pages artifact
    permissions:
      contents: read
      pages: read
    uses: ./.github/workflows/documentation-build.yml

  deploy:
    name: Deploy GitHub Pages
    if: >-
      ${{
        (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
        github.ref == 'refs/heads/main'
      }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

      - name: Verify deployed commit and catalog pages
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          site_url="${PAGE_URL%/}/"
          provenance="$RUNNER_TEMP/swiftql-pages-provenance.json"
          deployed=false
          for attempt in {1..30}; do
            if curl --fail --silent --show-error \
              --header 'Cache-Control: no-cache' \
              "${site_url}swiftql-pages-provenance.json?run=${GITHUB_RUN_ID}" \
              --output "$provenance" \
              && jq --exit-status \
                --arg commit_sha "$GITHUB_SHA" \
                --arg run_id "$GITHUB_RUN_ID" \
                '.commit_sha == $commit_sha and
                 .run_id == $run_id and
                 (.run_attempt | type == "string" and length > 0)' \
                "$provenance" > /dev/null; then
              deployed=true
              break
            fi
            if [[ "$attempt" -lt 30 ]]; then
              sleep 10
            fi
          done
          if [[ "$deployed" != true ]]; then
            echo "error: deployed provenance did not match this commit and run" >&2
            exit 1
          fi
          curl --fail --silent --show-error \
            --retry 12 --retry-all-errors --retry-delay 5 \
            "${site_url}documentation/swiftql/" \
            --output /dev/null
          curl --fail --silent --show-error \
            --retry 12 --retry-all-errors --retry-delay 5 \
            "${site_url}documentation/swiftql/gettingstarted/" \
            --output /dev/null
          curl --fail --silent --show-error \
            --retry 12 --retry-all-errors --retry-delay 5 \
            "${site_url}data/documentation/swiftql.json" \
            | jq --exit-status '.metadata.title == "SwiftQL"' > /dev/null
          curl --fail --silent --show-error \
            --retry 12 --retry-all-errors --retry-delay 5 \
            "${site_url}data/documentation/swiftql/gettingstarted.json" \
            | jq --exit-status \
              '(.metadata.title | ascii_downcase) == "getting started"' \
              > /dev/null

      - name: Record deployment summary
        env:
          ARTIFACT_ID: ${{ needs.build.outputs.artifact_id }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          {
            printf '### SwiftQL documentation deployment\n\n'
            printf -- '- Commit: `%s`\n' "$GITHUB_SHA"
            printf -- '- Artifact ID: `%s`\n' "$ARTIFACT_ID"
            printf -- '- Run: https://github.com/%s/actions/runs/%s\n' \
              "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID"
            printf -- '- Site: %s\n' "$PAGE_URL"
          } >> "$GITHUB_STEP_SUMMARY"
