name: Swift compatibility

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  release-tooling:
    name: Release tooling fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out exact source commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact source commit
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Validate release scripts and workflow YAML
        run: |
          set -euo pipefail
          bash -n scripts/ci/*.sh
          python3 -c \
            'import ast, pathlib; [ast.parse(path.read_text()) for path in pathlib.Path("scripts/ci").glob("*.py")]'
          ruby -e \
            'require "yaml"; Dir[".github/workflows/*.{yml,yaml}"].sort.each { |path| YAML.parse_file(path) }'

      - name: Enforce SwiftQLCore contract boundary
        run: |
          python3 scripts/ci/check-core-contract-boundary.py \
            --scratch-path "$RUNNER_TEMP/swiftql-core-boundary"

      - name: Run release workflow fixtures
        run: scripts/ci/test-release-workflow.sh

      - name: Run source coverage reporting fixtures
        run: python3 scripts/ci/test-source-coverage-report.py

      - name: Run Swift compatibility workflow fixtures
        run: python3 scripts/ci/test-swift-compatibility-workflow.py

      - name: Validate SQLite conformance inventory
        run: |
          python3 scripts/ci/test-sqlite-conformance-inventory.py
          python3 scripts/ci/sqlite-conformance-inventory.py check

      - name: Verify checkout remains clean
        run: |
          git diff --exit-code
          test -z "$(git status --porcelain)"

  coverage:
    name: Swift 6.0 / first-party source coverage
    runs-on: macos-15
    timeout-minutes: 60
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
      COVERAGE_SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Check out exact source commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ env.COVERAGE_SOURCE_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact source commit
        run: test "$(git rev-parse HEAD)" = "$COVERAGE_SOURCE_SHA"

      - name: Validate pinned Swift 6 coverage environment
        env:
          EXPECTED_XCODE_VERSION: "16.2"
          EXPECTED_XCODE_BUILD: 16C5032a
          EXPECTED_SWIFT_SERIES: "6.0"
          EXPECTED_SDK_VERSION: "15.2"
          EXPECTED_DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
        run: scripts/ci/check-compatibility-environment.sh

      - name: Run source coverage reporting fixtures
        run: python3 scripts/ci/test-source-coverage-report.py

      - name: Capture first clean coverage run
        id: coverage-run-1
        env:
          SWIFTQL_COVERAGE_SCRATCH_PATH: ${{ runner.temp }}/swiftql-coverage-build-1
        run: |
          scripts/ci/run-source-coverage.sh \
            "$RUNNER_TEMP/swiftql-coverage-run-1"

      - name: Capture second clean coverage run
        id: coverage-run-2
        env:
          SWIFTQL_COVERAGE_SCRATCH_PATH: ${{ runner.temp }}/swiftql-coverage-build-2
        run: |
          scripts/ci/run-source-coverage.sh \
            "$RUNNER_TEMP/swiftql-coverage-run-2"

      - name: Verify reproducible first-party source selection
        id: coverage-reproducibility
        run: |
          scripts/ci/verify-source-coverage-reproducibility.sh \
            "$RUNNER_TEMP/swiftql-coverage-run-1" \
            "$RUNNER_TEMP/swiftql-coverage-run-2" \
            "$RUNNER_TEMP/swiftql-coverage-run-1/reproducibility.json"
          cat "$RUNNER_TEMP/swiftql-coverage-run-1/summary.md" \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare retained source coverage evidence
        if: ${{ always() && !cancelled() }}
        env:
          FIRST_CAPTURE_OUTCOME: ${{ steps.coverage-run-1.outcome }}
          SECOND_CAPTURE_OUTCOME: ${{ steps.coverage-run-2.outcome }}
          REPRODUCIBILITY_OUTCOME: ${{ steps.coverage-reproducibility.outcome }}
        run: |
          set -euo pipefail
          for run in 1 2; do
            directory="$RUNNER_TEMP/swiftql-coverage-run-$run"
            mkdir -p "$directory"
            if [[ ! -e "$directory/first-party-coverage.json" ]]; then
              printf 'Capture did not produce a normalized report.\n' \
                > "$directory/capture-status.txt"
            fi
          done
          {
            printf 'first_capture=%s\n' "$FIRST_CAPTURE_OUTCOME"
            printf 'second_capture=%s\n' "$SECOND_CAPTURE_OUTCOME"
            printf 'reproducibility=%s\n' "$REPRODUCIBILITY_OUTCOME"
          } > "$RUNNER_TEMP/swiftql-coverage-run-1/workflow-step-outcomes.txt"

      - name: Upload retained source coverage evidence
        id: coverage-artifact
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: swiftql-source-coverage-${{ env.COVERAGE_SOURCE_SHA }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/swiftql-coverage-run-1
            ${{ runner.temp }}/swiftql-coverage-run-2
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

      - name: Link retained evidence from the job summary
        if: ${{ always() && !cancelled() && steps.coverage-artifact.outcome == 'success' }}
        env:
          ARTIFACT_URL: ${{ steps.coverage-artifact.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.coverage-artifact.outputs.artifact-digest }}
        run: |
          printf '\n## Retained raw evidence\n\n' >> "$GITHUB_STEP_SUMMARY"
          printf -- '- [Download the source coverage artifact](%s)\n' \
            "$ARTIFACT_URL" >> "$GITHUB_STEP_SUMMARY"
          printf -- '- Artifact SHA-256: `%s`\n' \
            "$ARTIFACT_DIGEST" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify checkout remains clean
        run: |
          git diff --exit-code
          test -z "$(git status --porcelain)"

  swift-series:
    name: Swift ${{ matrix.swift_series }} / Apple clean resolution
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - swift_series: "6.1"
            runner: macos-15
            developer_dir: /Applications/Xcode_16.4.app/Contents/Developer
            xcode_version: "16.4"
            xcode_build: 16F6
            sdk_version: "15.5"
          - swift_series: "6.2"
            runner: macos-15
            developer_dir: /Applications/Xcode_26.3.app/Contents/Developer
            xcode_version: "26.3"
            xcode_build: 17C529
            sdk_version: "26.2"
          - swift_series: "6.3"
            runner: macos-26
            developer_dir: /Applications/Xcode_26.5.app/Contents/Developer
            xcode_version: "26.5"
            xcode_build: 17F42
            sdk_version: "26.5"

    env:
      DEVELOPER_DIR: ${{ matrix.developer_dir }}

    steps:
      - name: Check out exact source commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Verify exact source commit
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Validate and report compiler environment
        env:
          EXPECTED_XCODE_VERSION: ${{ matrix.xcode_version }}
          EXPECTED_XCODE_BUILD: ${{ matrix.xcode_build }}
          EXPECTED_SWIFT_SERIES: ${{ matrix.swift_series }}
          EXPECTED_SDK_VERSION: ${{ matrix.sdk_version }}
          EXPECTED_DEVELOPER_DIR: ${{ matrix.developer_dir }}
        run: scripts/ci/check-compatibility-environment.sh

      - name: Prepare clean dependency resolution
        run: |
          set -euo pipefail
          source_directory="$RUNNER_TEMP/swiftql-clean-resolution"
          mkdir -p "$source_directory"
          git archive --format=tar HEAD | tar -xf - -C "$source_directory"
          rm "$source_directory/Package.resolved"
          rm "$source_directory/IntegrationTests/Swift5Client/Package.resolved"
          test ! -e "$source_directory/Package.resolved"
          test ! -e "$source_directory/IntegrationTests/Swift5Client/Package.resolved"
          printf 'SWIFTQL_SOURCE=%s\n' "$source_directory" >> "$GITHUB_ENV"

      - name: Resolve and report dependencies
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          xcrun swift package resolve
          scripts/ci/report-resolved-dependencies.sh
          test -f Package.resolved

      - name: Build all first-party targets and check warnings
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          scripts/ci/check-first-party-warnings.sh \
            "$RUNNER_TEMP/swift-build.log"

      - name: Report SQLite runtime through GRDB
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          xcrun swift test --skip-build --filter XLCompatibilityReportTests 2>&1 |
            tee "$RUNNER_TEMP/swift-test-build.log"
          runtime_markers="$(
            grep -c 'SWIFTQL_SQLITE_RUNTIME ' "$RUNNER_TEMP/swift-test-build.log" ||
              true
          )"
          if [[ "$runtime_markers" -ne 1 ]]; then
            echo "error: expected one SQLite runtime marker; found $runtime_markers" >&2
            exit 1
          fi

      - name: Run full test suite
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          xcrun swift test --skip-build -v

      - name: Verify checkout remains clean
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git diff --exit-code
          test -z "$(git status --porcelain)"

  compatibility:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Swift 5.9 / committed resolution
            runner: ubuntu-22.04
            platform: linux
            developer_dir: ""
            xcode_version: ""
            xcode_build: ""
            swift_series: "5.9"
            swift_version: "5.9.2"
            swift_command_mode: path
            sdk_version: ""
            image_os: ubuntu22
            architecture: x86_64
            os_id: ubuntu
            os_version_id: "22.04"
            target_triple: x86_64-unknown-linux-gnu
            resolution: committed
          - name: Swift 5.9 / clean resolution
            runner: ubuntu-22.04
            platform: linux
            developer_dir: ""
            xcode_version: ""
            xcode_build: ""
            swift_series: "5.9"
            swift_version: "5.9.2"
            swift_command_mode: path
            sdk_version: ""
            image_os: ubuntu22
            architecture: x86_64
            os_id: ubuntu
            os_version_id: "22.04"
            target_triple: x86_64-unknown-linux-gnu
            resolution: clean
          - name: Swift 6.0 / committed resolution
            runner: macos-15
            platform: macos
            developer_dir: /Applications/Xcode_16.2.app/Contents/Developer
            xcode_version: "16.2"
            xcode_build: 16C5032a
            swift_series: "6.0"
            swift_version: ""
            swift_command_mode: xcrun
            sdk_version: "15.2"
            image_os: macos15
            architecture: arm64
            os_id: ""
            os_version_id: ""
            target_triple: ""
            resolution: committed
          - name: Swift 6.0 / clean resolution
            runner: macos-15
            platform: macos
            developer_dir: /Applications/Xcode_16.2.app/Contents/Developer
            xcode_version: "16.2"
            xcode_build: 16C5032a
            swift_series: "6.0"
            swift_version: ""
            swift_command_mode: xcrun
            sdk_version: "15.2"
            image_os: macos15
            architecture: arm64
            os_id: ""
            os_version_id: ""
            target_triple: ""
            resolution: clean

    env:
      DEVELOPER_DIR: ${{ matrix.developer_dir }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Verify exact source commit
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Install exact Swift 5.9.2 toolchain
        if: ${{ matrix.platform == 'linux' }}
        env:
          SWIFT_TOOLCHAIN_URL: https://download.swift.org/swift-5.9.2-release/ubuntu2204/swift-5.9.2-RELEASE/swift-5.9.2-RELEASE-ubuntu22.04.tar.gz
          SWIFT_TOOLCHAIN_SIGNATURE_URL: https://download.swift.org/swift-5.9.2-release/ubuntu2204/swift-5.9.2-RELEASE/swift-5.9.2-RELEASE-ubuntu22.04.tar.gz.sig
          SWIFT_SIGNING_KEYS_URL: https://www.swift.org/keys/all-keys.asc
          SWIFT_SIGNING_FINGERPRINT: A62AE125BBBFBB96A6E042EC925CC1CCED3D1561
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/swift-5.9.2-RELEASE-ubuntu22.04.tar.gz"
          signature="$archive.sig"
          signing_keys="$RUNNER_TEMP/swift-signing-keys.asc"
          keyring_directory="$RUNNER_TEMP/swift-signing-keyring"

          curl --fail --location --proto '=https' --tlsv1.2 \
            --retry 3 --silent --show-error \
            --output "$archive" "$SWIFT_TOOLCHAIN_URL"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --retry 3 --silent --show-error \
            --output "$signature" "$SWIFT_TOOLCHAIN_SIGNATURE_URL"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --retry 3 --silent --show-error \
            --output "$signing_keys" "$SWIFT_SIGNING_KEYS_URL"

          mkdir -m 700 "$keyring_directory"
          gpg --batch --homedir "$keyring_directory" --import "$signing_keys"
          signature_status="$(
            gpg --batch --homedir "$keyring_directory" --status-fd 1 \
              --verify "$signature" "$archive" 2>&1
          )"
          printf '%s\n' "$signature_status"
          grep -Fq "[GNUPG:] VALIDSIG $SWIFT_SIGNING_FINGERPRINT " \
            <<< "$signature_status"

          tar -xzf "$archive" -C "$RUNNER_TEMP"
          toolchain_bin="$RUNNER_TEMP/swift-5.9.2-RELEASE-ubuntu22.04/usr/bin"
          test -x "$toolchain_bin/swift"
          test -x "$toolchain_bin/swiftc"
          printf '%s\n' "$toolchain_bin" >> "$GITHUB_PATH"

      - name: Validate and report compiler environment
        env:
          EXPECTED_XCODE_VERSION: ${{ matrix.xcode_version }}
          EXPECTED_XCODE_BUILD: ${{ matrix.xcode_build }}
          EXPECTED_PLATFORM: ${{ matrix.platform }}
          EXPECTED_SWIFT_SERIES: ${{ matrix.swift_series }}
          EXPECTED_SWIFT_VERSION: ${{ matrix.swift_version }}
          EXPECTED_SWIFT_COMMAND_MODE: ${{ matrix.swift_command_mode }}
          EXPECTED_SDK_VERSION: ${{ matrix.sdk_version }}
          EXPECTED_DEVELOPER_DIR: ${{ matrix.developer_dir }}
          EXPECTED_IMAGE_OS: ${{ matrix.image_os }}
          EXPECTED_ARCHITECTURE: ${{ matrix.architecture }}
          EXPECTED_OS_ID: ${{ matrix.os_id }}
          EXPECTED_OS_VERSION_ID: ${{ matrix.os_version_id }}
          EXPECTED_TARGET_TRIPLE: ${{ matrix.target_triple }}
        run: scripts/ci/check-compatibility-environment.sh

      - name: Prepare ${{ matrix.resolution }} dependency resolution
        env:
          RESOLUTION_MODE: ${{ matrix.resolution }}
        run: |
          set -euo pipefail
          if [[ "$RESOLUTION_MODE" == "committed" ]]; then
            source_directory="$GITHUB_WORKSPACE"
          else
            source_directory="$RUNNER_TEMP/swiftql-clean-resolution"
            mkdir -p "$source_directory"
            git archive --format=tar HEAD | tar -xf - -C "$source_directory"
            rm "$source_directory/Package.resolved"
            rm "$source_directory/IntegrationTests/Swift5Client/Package.resolved"
            test ! -e "$source_directory/Package.resolved"
            test ! -e "$source_directory/IntegrationTests/Swift5Client/Package.resolved"
          fi
          printf 'SWIFTQL_SOURCE=%s\n' "$source_directory" >> "$GITHUB_ENV"

      - name: Resolve and report dependencies
        env:
          RESOLUTION_MODE: ${{ matrix.resolution }}
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          swift package resolve
          scripts/ci/report-resolved-dependencies.sh
          if [[ "$RESOLUTION_MODE" == "committed" ]]; then
            git diff --exit-code -- Package.resolved
          else
            test -f Package.resolved
          fi

      - name: Build and check first-party warning cleanliness
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          scripts/ci/check-first-party-warnings.sh \
            "$RUNNER_TEMP/swift-build.log"

      - name: Check bitwise NOT type safety
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          scripts/ci/check-bitwise-not-type-safety.sh

      - name: Check query clause ordering type safety
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          scripts/ci/check-query-clause-ordering-type-safety.sh

      - name: Report SQLite runtime through GRDB
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          swift test --filter XLCompatibilityReportTests 2>&1 |
            tee "$RUNNER_TEMP/swift-test-build.log"
          runtime_markers="$(
            grep -c 'SWIFTQL_SQLITE_RUNTIME ' "$RUNNER_TEMP/swift-test-build.log" ||
              true
          )"
          if [[ "$runtime_markers" -ne 1 ]]; then
            echo "error: expected one SQLite runtime marker; found $runtime_markers" >&2
            exit 1
          fi

      - name: Smoke-test performance benchmark
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          benchmark_report="$RUNNER_TEMP/swiftql-benchmark.json"
          swift run --skip-build swiftql-benchmark \
            --warmups 0 \
            --samples 1 \
            --output "$benchmark_report" 2>&1 | \
            tee "$RUNNER_TEMP/swiftql-benchmark.log"
          test -s "$benchmark_report"
          benchmark_markers="$(
            grep -c 'SWIFTQL_BENCHMARK_REPORT ' "$RUNNER_TEMP/swiftql-benchmark.log" ||
              true
          )"
          if [[ "$benchmark_markers" -ne 1 ]]; then
            echo "error: expected one benchmark report marker; found $benchmark_markers" >&2
            exit 1
          fi

      - name: Run bounded combinatorial SQLite conformance suite
        id: combinatorial-conformance
        env:
          SWIFTQL_COMBINATORIAL_MANIFEST_PATH: ${{ runner.temp }}/swiftql-combinatorial/manifest.json
          SWIFTQL_COMBINATORIAL_SUMMARY_PATH: ${{ runner.temp }}/swiftql-combinatorial/summary.md
          SWIFTQL_COMBINATORIAL_RUNTIME_REPORT_PATH: ${{ runner.temp }}/swiftql-combinatorial/runtime-report.json
        run: |
          set -uo pipefail
          output_directory="$RUNNER_TEMP/swiftql-combinatorial"
          mkdir -p "$output_directory"
          cd "$SWIFTQL_SOURCE"

          # Two independent test processes must emit byte-identical ordered
          # case manifests (including every rendered SQL string) and summaries.
          set -e
          for run_index in 1 2; do
            determinism_directory="$output_directory/determinism-run-$run_index"
            mkdir -p "$determinism_directory"
            SWIFTQL_COMBINATORIAL_MANIFEST_PATH="$determinism_directory/manifest.json" \
            SWIFTQL_COMBINATORIAL_SUMMARY_PATH="$determinism_directory/summary.md" \
              swift test --skip-build \
                --filter SQLiteCombinatorialConformanceTests/testGeneratedManifestIsDeterministicAndMatchesCheckedInArtifacts \
                2>&1 | tee "$determinism_directory/test.log"
            test -s "$determinism_directory/manifest.json"
            test -s "$determinism_directory/summary.md"
          done
          cmp \
            "$output_directory/determinism-run-1/manifest.json" \
            "$output_directory/determinism-run-2/manifest.json"
          cmp \
            "$output_directory/determinism-run-1/summary.md" \
            "$output_directory/determinism-run-2/summary.md"
          printf 'SWIFTQL_COMBINATORIAL_CLEAN_PROCESS_DETERMINISM PASS\n' | \
            tee "$output_directory/determinism-result.txt"

          set +e
          swift test --skip-build \
            --filter SQLiteCombinatorialConformanceTests 2>&1 | \
            tee "$output_directory/test.log"
          test_status="${PIPESTATUS[0]}"
          set -e

          missing_evidence=0
          for evidence_path in \
            "$SWIFTQL_COMBINATORIAL_MANIFEST_PATH" \
            "$SWIFTQL_COMBINATORIAL_SUMMARY_PATH" \
            "$SWIFTQL_COMBINATORIAL_RUNTIME_REPORT_PATH"; do
            if [[ ! -s "$evidence_path" ]]; then
              printf 'error: combinatorial test did not produce nonempty evidence: %s\n' \
                "$evidence_path" >&2
              missing_evidence=1
            fi
          done

          if [[ -s "$SWIFTQL_COMBINATORIAL_SUMMARY_PATH" ]]; then
            printf '\n' >> "$GITHUB_STEP_SUMMARY"
            cat "$SWIFTQL_COMBINATORIAL_SUMMARY_PATH" \
              >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$test_status" -ne 0 ]]; then
            exit "$test_status"
          fi
          if [[ "$missing_evidence" -ne 0 ]]; then
            exit 1
          fi

      - name: Prepare retained combinatorial SQLite evidence
        if: ${{ always() && !cancelled() }}
        env:
          COMBINATORIAL_STEP_OUTCOME: ${{ steps.combinatorial-conformance.outcome }}
        run: |
          set -euo pipefail
          output_directory="$RUNNER_TEMP/swiftql-combinatorial"
          mkdir -p "$output_directory"
          {
            printf 'combinatorial_step=%s\n' "$COMBINATORIAL_STEP_OUTCOME"
            for evidence_name in \
              manifest.json \
              summary.md \
              runtime-report.json \
              determinism-result.txt \
              test.log; do
              evidence_path="$output_directory/$evidence_name"
              if [[ -s "$evidence_path" ]]; then
                printf '%s=nonempty\n' "$evidence_name"
              elif [[ -e "$evidence_path" ]]; then
                printf '%s=empty\n' "$evidence_name"
              else
                printf '%s=missing\n' "$evidence_name"
              fi
            done
          } > "$output_directory/workflow-step-outcomes.txt"

          if [[ -s "$output_directory/runtime-report.json" ]]; then
            if runtime_summary="$(
              /usr/bin/python3 -c '
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as source:
              report = json.load(source)
          print(
              "Cases: {} / {}; runtime: {:.1f} ms / {} ms.".format(
                  report["manifest_case_count"],
                  report["hard_bounds"]["maximum_case_count"],
                  report["total_elapsed_ms"],
                  report["maximum_runtime_ms"],
              )
          )
          ' "$output_directory/runtime-report.json"
            )"; then
              printf '\n### Combinatorial SQLite runtime bound\n\n%s\n' \
                "$runtime_summary" >> "$GITHUB_STEP_SUMMARY"
            else
              printf '\nRuntime summary extraction failed; the retained JSON artifact is authoritative.\n' \
                >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Upload retained combinatorial SQLite evidence
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: swiftql-combinatorial-${{ matrix.swift_series }}-${{ matrix.resolution }}-${{ github.sha }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/swiftql-combinatorial
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

      - name: Run bounded live-query stress loop
        id: live-query-stress
        if: ${{ matrix.swift_series == '6.0' && matrix.resolution == 'committed' }}
        env:
          SWIFTQL_LIVE_QUERY_STRESS_ITERATIONS: "10"
          SWIFTQL_LIVE_QUERY_STRESS_SKIP_BUILD: "1"
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          scripts/ci/run-live-query-stress.sh \
            "$RUNNER_TEMP/swiftql-live-query-stress"
          cat "$RUNNER_TEMP/swiftql-live-query-stress/summary.md" \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare retained live-query stress evidence
        if: ${{ always() && !cancelled() && matrix.swift_series == '6.0' && matrix.resolution == 'committed' }}
        env:
          LIVE_QUERY_STRESS_OUTCOME: ${{ steps.live-query-stress.outcome }}
        run: |
          set -euo pipefail
          output_directory="$RUNNER_TEMP/swiftql-live-query-stress"
          mkdir -p "$output_directory"
          printf 'workflow_step=%s\n' "$LIVE_QUERY_STRESS_OUTCOME" \
            > "$output_directory/workflow-step-outcome.txt"

      - name: Upload retained live-query stress evidence
        id: live-query-stress-artifact
        if: ${{ always() && !cancelled() && matrix.swift_series == '6.0' && matrix.resolution == 'committed' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: swiftql-live-query-stress-${{ github.sha }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/swiftql-live-query-stress
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

      - name: Link retained live-query stress evidence
        if: ${{ always() && !cancelled() && steps.live-query-stress-artifact.outcome == 'success' }}
        env:
          ARTIFACT_URL: ${{ steps.live-query-stress-artifact.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.live-query-stress-artifact.outputs.artifact-digest }}
        run: |
          printf '\n### Retained live-query stress evidence\n\n' \
            >> "$GITHUB_STEP_SUMMARY"
          printf -- '- [Download the clean-process logs](%s)\n' \
            "$ARTIFACT_URL" >> "$GITHUB_STEP_SUMMARY"
          printf -- '- Artifact SHA-256: `%s`\n' \
            "$ARTIFACT_DIGEST" >> "$GITHUB_STEP_SUMMARY"

      - name: Run full test suite
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          swift test --skip-build -v

      - name: Check complete strict concurrency
        if: ${{ matrix.swift_series == '6.0' }}
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          scripts/ci/check-strict-concurrency.sh \
            "$RUNNER_TEMP/swift-strict-concurrency.log"

      - name: Run downstream Swift 5 language-mode client
        if: ${{ matrix.swift_series == '6.0' }}
        env:
          RESOLUTION_MODE: ${{ matrix.resolution }}
          SWIFTQL_DOWNSTREAM_SCRATCH_PATH: ${{ runner.temp }}/swift5-client-build
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          scripts/ci/check-downstream-swift5-client.sh \
            "$RESOLUTION_MODE" \
            "$RUNNER_TEMP/swift5-client.log"

      - name: Build and inspect DocC static site
        if: ${{ matrix.swift_series == '6.0' && matrix.resolution == 'committed' }}
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          ./make-docs.sh "$RUNNER_TEMP/swiftql-docs"
          git -C "$GITHUB_WORKSPACE" diff --exit-code
          test -z "$(git -C "$GITHUB_WORKSPACE" status --porcelain)"

      - name: Verify checkout remains clean
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git diff --exit-code
          test -z "$(git status --porcelain)"
