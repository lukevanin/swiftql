name: Swift compatibility

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  release-tooling:
    name: Release tooling fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out exact source commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Verify exact source commit
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Validate release scripts and workflow YAML
        run: |
          set -euo pipefail
          bash -n scripts/ci/*.sh
          python3 -c \
            'import ast, pathlib; ast.parse(pathlib.Path("scripts/ci/release-archive.py").read_text())'
          ruby -e \
            'require "yaml"; Dir[".github/workflows/*.{yml,yaml}"].sort.each { |path| YAML.parse_file(path) }'

      - name: Run release workflow fixtures
        run: scripts/ci/test-release-workflow.sh

      - name: Verify checkout remains clean
        run: |
          git diff --exit-code
          test -z "$(git status --porcelain)"

  compatibility:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Swift 5.9 / committed resolution
            runner: macos-14
            developer_dir: /Applications/Xcode_15.2.app/Contents/Developer
            xcode_version: "15.2"
            xcode_build: 15C500b
            swift_series: "5.9"
            sdk_version: "14.2"
            resolution: committed
          - name: Swift 5.9 / clean resolution
            runner: macos-14
            developer_dir: /Applications/Xcode_15.2.app/Contents/Developer
            xcode_version: "15.2"
            xcode_build: 15C500b
            swift_series: "5.9"
            sdk_version: "14.2"
            resolution: clean
          - name: Swift 6.0 / committed resolution
            runner: macos-15
            developer_dir: /Applications/Xcode_16.2.app/Contents/Developer
            xcode_version: "16.2"
            xcode_build: 16C5032a
            swift_series: "6.0"
            sdk_version: "15.2"
            resolution: committed
          - name: Swift 6.0 / clean resolution
            runner: macos-15
            developer_dir: /Applications/Xcode_16.2.app/Contents/Developer
            xcode_version: "16.2"
            xcode_build: 16C5032a
            swift_series: "6.0"
            sdk_version: "15.2"
            resolution: clean

    env:
      DEVELOPER_DIR: ${{ matrix.developer_dir }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Verify exact source commit
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Validate and report compiler environment
        env:
          EXPECTED_XCODE_VERSION: ${{ matrix.xcode_version }}
          EXPECTED_XCODE_BUILD: ${{ matrix.xcode_build }}
          EXPECTED_SWIFT_SERIES: ${{ matrix.swift_series }}
          EXPECTED_SDK_VERSION: ${{ matrix.sdk_version }}
          EXPECTED_DEVELOPER_DIR: ${{ matrix.developer_dir }}
        run: scripts/ci/check-compatibility-environment.sh

      - name: Prepare ${{ matrix.resolution }} dependency resolution
        env:
          RESOLUTION_MODE: ${{ matrix.resolution }}
        run: |
          set -euo pipefail
          if [[ "$RESOLUTION_MODE" == "committed" ]]; then
            source_directory="$GITHUB_WORKSPACE"
          else
            source_directory="$RUNNER_TEMP/swiftql-clean-resolution"
            mkdir -p "$source_directory"
            git archive --format=tar HEAD | tar -xf - -C "$source_directory"
            rm "$source_directory/Package.resolved"
            rm "$source_directory/IntegrationTests/Swift5Client/Package.resolved"
            test ! -e "$source_directory/Package.resolved"
            test ! -e "$source_directory/IntegrationTests/Swift5Client/Package.resolved"
          fi
          printf 'SWIFTQL_SOURCE=%s\n' "$source_directory" >> "$GITHUB_ENV"

      - name: Resolve and report dependencies
        env:
          RESOLUTION_MODE: ${{ matrix.resolution }}
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          xcrun swift package resolve
          scripts/ci/report-resolved-dependencies.sh
          if [[ "$RESOLUTION_MODE" == "committed" ]]; then
            git diff --exit-code -- Package.resolved
          else
            test -f Package.resolved
          fi

      - name: Build and check first-party warning cleanliness
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          scripts/ci/check-first-party-warnings.sh \
            "$RUNNER_TEMP/swift-build.log"

      - name: Check bitwise NOT type safety
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          scripts/ci/check-bitwise-not-type-safety.sh

      - name: Report SQLite runtime through GRDB
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          xcrun swift test --filter XLCompatibilityReportTests 2>&1 |
            tee "$RUNNER_TEMP/swift-test-build.log"
          runtime_markers="$(
            grep -c 'SWIFTQL_SQLITE_RUNTIME ' "$RUNNER_TEMP/swift-test-build.log" ||
              true
          )"
          if [[ "$runtime_markers" -ne 1 ]]; then
            echo "error: expected one SQLite runtime marker; found $runtime_markers" >&2
            exit 1
          fi

      - name: Smoke-test performance benchmark
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          benchmark_report="$RUNNER_TEMP/swiftql-benchmark.json"
          xcrun swift run --skip-build swiftql-benchmark \
            --warmups 0 \
            --samples 1 \
            --output "$benchmark_report" 2>&1 | \
            tee "$RUNNER_TEMP/swiftql-benchmark.log"
          test -s "$benchmark_report"
          benchmark_markers="$(
            grep -c 'SWIFTQL_BENCHMARK_REPORT ' "$RUNNER_TEMP/swiftql-benchmark.log" ||
              true
          )"
          if [[ "$benchmark_markers" -ne 1 ]]; then
            echo "error: expected one benchmark report marker; found $benchmark_markers" >&2
            exit 1
          fi

      - name: Run full test suite
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          xcrun swift test --skip-build -v

      - name: Check complete strict concurrency
        if: ${{ matrix.swift_series == '6.0' }}
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          scripts/ci/check-strict-concurrency.sh \
            "$RUNNER_TEMP/swift-strict-concurrency.log"

      - name: Run downstream Swift 5 language-mode client
        if: ${{ matrix.swift_series == '6.0' }}
        env:
          RESOLUTION_MODE: ${{ matrix.resolution }}
          SWIFTQL_DOWNSTREAM_SCRATCH_PATH: ${{ runner.temp }}/swift5-client-build
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          scripts/ci/check-downstream-swift5-client.sh \
            "$RESOLUTION_MODE" \
            "$RUNNER_TEMP/swift5-client.log"

      - name: Build and inspect DocC static site
        if: ${{ matrix.swift_series == '6.0' && matrix.resolution == 'committed' }}
        run: |
          set -euo pipefail
          cd "$SWIFTQL_SOURCE"
          ./make-docs.sh "$RUNNER_TEMP/swiftql-docs"
          git -C "$GITHUB_WORKSPACE" diff --exit-code
          test -z "$(git -C "$GITHUB_WORKSPACE" status --porcelain)"

      - name: Verify checkout remains clean
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git diff --exit-code
          test -z "$(git status --porcelain)"
